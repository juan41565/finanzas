<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Editorial Finance | Beneficiaries</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
</head>
<body class="bg-gray-50 text-gray-900 antialiased">
    <aside class="h-screen w-64 fixed left-0 top-0 bg-slate-100 font-manrope text-sm font-medium flex flex-col p-4 space-y-2 z-50">
        <div class="mb-8 px-2 py-4"><h1 class="text-xl font-extrabold tracking-tighter text-blue-900">Ledger Intelligence</h1></div>
        <nav class="flex-1 space-y-1">
            <a class="text-slate-500 hover:bg-slate-200 flex items-center gap-3 px-3 py-2.5 rounded-md" href="dashboard.html"><span class="material-symbols-outlined">dashboard</span><span>Dashboard</span></a>
            <a class="text-slate-500 hover:bg-slate-200 flex items-center gap-3 px-3 py-2.5 rounded-md" href="movements.html"><span class="material-symbols-outlined">swap_horiz</span><span>Movements</span></a>
            <a class="text-slate-500 hover:bg-slate-200 flex items-center gap-3 px-3 py-2.5 rounded-md" href="categories.html"><span class="material-symbols-outlined">category</span><span>Categories</span></a>
            <a class="bg-white text-blue-900 shadow-sm flex items-center gap-3 px-3 py-2.5 rounded-md" href="beneficiaries.html"><span class="material-symbols-outlined">person</span><span>Beneficiaries</span></a>
        </nav>
    </aside>

    <main class="ml-64 min-h-screen flex flex-col">
        <header class="w-full sticky top-0 z-40 bg-white/80 backdrop-blur-xl border-b flex justify-between items-center px-6 py-3">
            <span class="text-lg font-bold text-blue-900">Editorial Finance</span>
            <div id="currentWorkspace" class="text-sm font-semibold opacity-60">Workspace</div>
        </header>

        <div class="p-8 max-w-7xl mx-auto w-full">
            <div class="flex justify-between items-end mb-10">
                <div><h2 class="text-3xl font-extrabold text-blue-900 tracking-tight">Beneficiaries</h2><p class="text-gray-500 text-sm mt-1">Manage institutional and personal payees.</p></div>
                <button id="addBeneficiaryBtn" class="bg-blue-900 text-white px-6 py-3 rounded-md font-semibold text-sm shadow-md">+ Add Beneficiary</button>
            </div>
            <div id="beneficiariesList" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </div>

        <div id="beneficiaryModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[60] flex items-center justify-center hidden">
            <div class="bg-white w-full max-w-md rounded-xl p-8 border">
                <h3 class="text-2xl font-extrabold text-blue-900 mb-6">New Beneficiary</h3>
                <form id="beneficiaryForm" class="space-y-4">
                    <div><label class="text-[10px] font-bold uppercase text-gray-400">Name</label><input name="nombre" class="w-full bg-gray-50 border rounded-md py-3 px-4 text-sm" required/></div>
                    <div class="pt-4 flex gap-3"><button type="button" id="closeBeneficiaryModal" class="flex-1 py-3 bg-gray-100 rounded-md font-bold text-sm">Cancel</button><button type="submit" class="flex-1 py-3 bg-blue-900 text-white rounded-md font-bold text-sm">Save</button></div>
                </form>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        async function initBeneficiaries() {
            if (!await window.auth.checkSession()) return;
            const workspaceId = localStorage.getItem('workspaceId');
            const nameEl = document.getElementById('currentWorkspace');
            if (nameEl) nameEl.textContent = localStorage.getItem('workspaceName');

            loadBeneficiaries(workspaceId);

            const modal = document.getElementById('beneficiaryModal');
            document.getElementById('addBeneficiaryBtn').onclick = () => modal.classList.remove('hidden');
            document.getElementById('closeBeneficiaryModal').onclick = () => modal.classList.add('hidden');

            document.getElementById('beneficiaryForm').onsubmit = async (e) => {
                e.preventDefault();
                const data = Object.fromEntries(new FormData(e.target).entries());
                data.workspaceId = workspaceId;
                try {
                    await window.api.beneficiaries.create(data);
                    modal.classList.add('hidden');
                    e.target.reset();
                    loadBeneficiaries(workspaceId);
                } catch (error) { alert(error.message); }
            };
        }

        async function loadBeneficiaries(workspaceId) {
            try {
                const response = await window.api.beneficiaries.list(workspaceId);
                const list = document.getElementById('beneficiariesList');
                list.innerHTML = '';
                if (response.data) {
                    response.data.forEach(ben => {
                        const card = document.createElement('div');
                        card.className = 'bg-white p-6 rounded-xl border-gray-100 border shadow-sm flex items-center gap-4';
                        card.innerHTML = `<div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-900 font-bold">${ben.nombre.charAt(0)}</div><span class="font-bold text-gray-900">${ben.nombre}</span>`;
                        list.appendChild(card);
                    });
                }
            } catch (error) { console.error(error); }
        }
        initBeneficiaries();
    </script>
</body>
</html>
