<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Editorial Finance | Movimientos</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
</head>
<body class="bg-surface text-gray-900 antialiased">
    <aside class="h-screen w-64 fixed left-0 top-0 bg-slate-100 font-manrope text-sm font-medium flex flex-col p-4 space-y-2 z-50">
        <div class="mb-8 px-2 py-4"><h1 class="text-xl font-extrabold tracking-tighter text-blue-900">Ledger Intelligence</h1></div>
        <nav class="flex-1 space-y-1">
            <a class="text-slate-500 hover:bg-slate-200 flex items-center gap-3 px-3 py-2.5 rounded-md" id="nav-dashboard" href="dashboard.html"><span class="material-symbols-outlined">dashboard</span><span>Dashboard</span></a>
            <a class="text-slate-500 hover:bg-slate-200 flex items-center gap-3 px-3 py-2.5 rounded-md" id="nav-accounts" href="accounts.html"><span class="material-symbols-outlined">account_balance</span><span>Cuentas</span></a>
            <a class="text-slate-500 hover:bg-slate-200 flex items-center gap-3 px-3 py-2.5 rounded-md" id="nav-cards" href="cards.html"><span class="material-symbols-outlined">credit_card</span><span>Tarjetas</span></a>
            <a class="text-slate-500 hover:bg-slate-200 flex items-center gap-3 px-3 py-2.5 rounded-md" id="nav-movements" href="movements.html"><span class="material-symbols-outlined">swap_horiz</span><span>Movimientos</span></a>
            <a class="text-slate-500 hover:bg-slate-200 flex items-center gap-3 px-3 py-2.5 rounded-md" id="nav-categories" href="categories.html"><span class="material-symbols-outlined">category</span><span>Categorías</span></a>
            <a class="text-slate-500 hover:bg-slate-200 flex items-center gap-3 px-3 py-2.5 rounded-md" id="nav-beneficiaries" href="beneficiaries.html"><span class="material-symbols-outlined">person</span><span>Beneficiarios</span></a>
        </nav>
    </aside>

    <main class="ml-64 min-h-screen flex flex-col">
        <header class="w-full sticky top-0 z-40 bg-white/80 backdrop-blur-xl border-b flex justify-between items-center px-6 py-3">
            <span class="text-lg font-bold text-blue-900">Editorial Finance</span>
            <div id="currentWorkspace" class="text-sm font-semibold opacity-60">Workspace</div>
        </header>

        <div class="p-8 max-w-7xl mx-auto w-full space-y-8">
            <div class="flex justify-between items-end">
                <div><h2 class="text-3xl font-extrabold text-blue-900 tracking-tight">Libro de Movimientos</h2><p class="text-gray-500 text-sm mt-1">Historial detallado de transacciones financieras.</p></div>
                <button id="addMovementBtn" class="bg-blue-900 text-white px-6 py-3 rounded-md font-semibold text-sm shadow-md">+ Nuevo Movimiento</button>
            </div>
            <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead><tr class="bg-gray-50 border-b"><th class="px-6 py-4 text-[10px] font-bold uppercase text-gray-400">Fecha</th><th class="px-6 py-4 text-[10px] font-bold uppercase text-gray-400">Descripción</th><th class="px-6 py-4 text-[10px] font-bold uppercase text-gray-400">Categoría</th><th class="px-6 py-4 text-[10px] font-bold uppercase text-gray-400 text-right">Monto</th><th class="px-6 py-4 w-10"></th></tr></thead>
                    <tbody id="movementsBody" class="divide-y"></tbody>
                </table>
            </div>
        </div>

        <div id="movementModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[60] flex items-center justify-center hidden">
            <div class="bg-white w-full max-w-lg rounded-xl p-8 border">
                <h3 class="text-2xl font-extrabold text-blue-900 mb-6">Registrar Transacción</h3>
                <form id="movementForm" class="grid grid-cols-2 gap-4">
                    <div class="col-span-1"><label class="text-[10px] font-bold uppercase text-gray-400">Fecha</label><input name="fecha" type="date" class="w-full bg-gray-50 border rounded-md py-3 px-4 text-sm" required/></div>
                    <div class="col-span-1"><label class="text-[10px] font-bold uppercase text-gray-400">Tipo</label><select name="tipo" class="w-full bg-gray-50 border rounded-md py-3 px-4 text-sm" id="typeSelect"><option value="GASTO">Gasto</option><option value="INGRESO">Ingreso</option></select></div>
                    <div class="col-span-2"><label class="text-[10px] font-bold uppercase text-gray-400">Descripción</label><input name="descripcion" class="w-full bg-gray-50 border rounded-md py-3 px-4 text-sm" placeholder="Ej: Pago de servicios" required/></div>
                    <div class="col-span-1"><label class="text-[10px] font-bold uppercase text-gray-400">Categoría</label><select name="categoriaId" id="categorySelect" class="w-full bg-gray-50 border rounded-md py-3 px-4 text-sm" required></select></div>
                    <div class="col-span-1"><label class="text-[10px] font-bold uppercase text-gray-400">Beneficiario</label><select name="beneficiarioId" id="beneficiarySelect" class="w-full bg-gray-50 border rounded-md py-3 px-4 text-sm"></select></div>
                    <div class="col-span-1"><label class="text-[10px] font-bold uppercase text-gray-400">Medio de Pago</label><select name="medioPago" id="paymentMethodSelect" class="w-full bg-gray-50 border rounded-md py-3 px-4 text-sm" required><option value="EFECTIVO">Efectivo</option><option value="TRANSFERENCIA">Transferencia</option><option value="TARJETA_DEBITO">Tarjeta Débito</option><option value="TARJETA_CREDITO">Tarjeta Crédito</option><option value="OTRO">Otro</option></select></div>
                    <div class="col-span-1" id="accountGroup"><label class="text-[10px] font-bold uppercase text-gray-400">Cuenta de Origen/Destino</label><select name="cuentaId" id="accountSelect" class="w-full bg-gray-50 border rounded-md py-3 px-4 text-sm"></select></div>
                    <div class="col-span-1 hidden" id="cardGroup"><label class="text-[10px] font-bold uppercase text-gray-400">Tarjeta de Crédito</label><select name="tarjetaCreditoId" id="cardSelect" class="w-full bg-gray-50 border rounded-md py-3 px-4 text-sm"></select></div>
                    <div class="col-span-1"><label class="text-[10px] font-bold uppercase text-gray-400">Monto ($)</label><input name="monto" type="number" step="0.01" class="w-full bg-gray-50 border rounded-md py-3 px-4 text-sm text-right font-bold" required/></div>
                    <div class="pt-4 col-span-2 flex gap-3"><button type="button" id="closeMovementModal" class="flex-1 py-3 bg-gray-100 rounded-md font-bold text-sm">Cancelar</button><button type="submit" class="flex-1 py-3 bg-blue-900 text-white rounded-md font-bold text-sm shadow-md">Confirmar Registro</button></div>
                </form>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/movements.js"></script>
</body>
</html>
