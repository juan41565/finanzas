<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Editorial Finance | Registro</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
</head>
<body class="bg-gray-50 text-gray-900 antialiased flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-blue-900 tracking-tighter mb-2">Inicializar Workspace</h1>
            <p class="text-gray-500 text-sm uppercase tracking-widest font-medium">Nuevo Despliegue</p>
        </div>

        <form id="registerForm" class="space-y-6">
            <div class="space-y-1.5">
                <label class="text-[10px] font-bold uppercase tracking-wider text-gray-400 px-1">Nombre Completo</label>
                <input name="nombre" class="w-full bg-gray-50 border rounded-md py-3 px-4 text-sm focus:ring-blue-900 h-12" required/>
            </div>
            <div class="space-y-1.5">
                <label class="text-[10px] font-bold uppercase tracking-wider text-gray-400 px-1">Correo Institucional</label>
                <input name="email" type="email" class="w-full bg-gray-50 border rounded-md py-3 px-4 text-sm focus:ring-blue-900 h-12" required/>
            </div>
            <div class="space-y-1.5">
                <label class="text-[10px] font-bold uppercase tracking-wider text-gray-400 px-1">Contraseña (Mín. 6 carc.)</label>
                <input name="password" type="password" minlength="6" class="w-full bg-gray-50 border rounded-md py-3 px-4 text-sm focus:ring-blue-900 h-12" required/>
            </div>
            <div id="errorMessage" class="hidden text-red-600 text-xs p-3 bg-red-50 rounded-md border border-red-200 items-center gap-2">
                <span id="errorText">Error</span>
            </div>
            <button class="w-full bg-blue-900 text-white py-4 rounded-xl font-bold text-sm tracking-tight shadow-md hover:opacity-90 active:scale-[0.98]" type="submit">
                Desplegar Cuenta
            </button>
        </form>

        <div class="mt-8 pt-6 border-t text-center">
            <button class="text-blue-900 font-bold text-sm hover:underline" onclick="window.location.href='login.html'">Volver al Acceso</button>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const registerForm = document.getElementById('registerForm');
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(registerForm).entries());
            try {
                await window.api.auth.register(data);
                alert('Cuenta creada exitosamente. Por favor inicia sesión.');
                window.location.href = 'login.html';
            } catch (error) {
                document.getElementById('errorMessage').classList.remove('hidden');
                document.getElementById('errorText').textContent = error.message;
            }
        });
    </script>
</body>
</html>
