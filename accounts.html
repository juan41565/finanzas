<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Editorial Finance | Cuentas</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
</head>
<body class="bg-gray-50 text-gray-900 antialiased">
    <aside class="h-screen w-64 fixed left-0 top-0 bg-slate-100 font-manrope text-sm font-medium flex flex-col p-4 space-y-2 z-50">
        <div class="mb-8 px-2 py-4"><h1 class="text-xl font-extrabold tracking-tighter text-blue-900">Ledger Intelligence</h1></div>
        <nav class="flex-1 space-y-1">
            <a class="text-slate-500 hover:bg-slate-200 flex items-center gap-3 px-3 py-2.5 rounded-md" id="nav-dashboard" href="dashboard.html"><span class="material-symbols-outlined">dashboard</span><span>Dashboard</span></a>
            <a class="bg-white text-blue-900 shadow-sm flex items-center gap-3 px-3 py-2.5 rounded-md" id="nav-accounts" href="accounts.html"><span class="material-symbols-outlined">account_balance</span><span>Cuentas</span></a>
            <a class="text-slate-500 hover:bg-slate-200 flex items-center gap-3 px-3 py-2.5 rounded-md" id="nav-cards" href="cards.html"><span class="material-symbols-outlined">credit_card</span><span>Tarjetas</span></a>
            <a class="text-slate-500 hover:bg-slate-200 flex items-center gap-3 px-3 py-2.5 rounded-md" id="nav-movements" href="movements.html"><span class="material-symbols-outlined">swap_horiz</span><span>Movimientos</span></a>
            <a class="text-slate-500 hover:bg-slate-200 flex items-center gap-3 px-3 py-2.5 rounded-md" id="nav-categories" href="categories.html"><span class="material-symbols-outlined">category</span><span>Categorías</span></a>
            <a class="text-slate-500 hover:bg-slate-200 flex items-center gap-3 px-3 py-2.5 rounded-md" id="nav-beneficiaries" href="beneficiaries.html"><span class="material-symbols-outlined">person</span><span>Beneficiarios</span></a>
        </nav>
    </aside>

    <main class="ml-64 min-h-screen flex flex-col">
        <header class="w-full sticky top-0 z-40 bg-white/80 backdrop-blur-xl border-b flex justify-between items-center px-6 py-3">
            <span class="text-lg font-bold text-blue-900">Editorial Finance</span>
            <div id="currentWorkspace" class="text-sm font-semibold opacity-60">Workspace</div>
        </header>

        <div class="p-8 max-w-7xl mx-auto w-full">
            <div class="flex justify-between items-end mb-10">
                <div><h2 class="text-3xl font-extrabold text-blue-900 tracking-tight">Mis Cuentas</h2><p class="text-gray-500 text-sm mt-1">Gestione sus fondos y orígenes de dinero.</p></div>
                <button id="addAccountBtn" class="bg-blue-900 text-white px-6 py-3 rounded-md font-semibold text-sm shadow-md">+ Nueva Cuenta</button>
            </div>
            <div id="accountsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>

        <div id="accountModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[60] flex items-center justify-center hidden">
            <div class="bg-white w-full max-w-md rounded-xl p-8 border">
                <h3 class="text-2xl font-extrabold text-blue-900 mb-6">Añadir Cuenta</h3>
                <form id="accountForm" class="space-y-4">
                    <div><label class="text-[10px] font-bold uppercase text-gray-400">Nombre de la Cuenta</label><input name="nombre" class="w-full bg-gray-50 border rounded-md py-3 px-4 text-sm" placeholder="Ej: Ahorros Principal" required/></div>
                    <div><label class="text-[10px] font-bold uppercase text-gray-400">Número de Cuenta / Identificador</label><input name="numero" class="w-full bg-gray-50 border rounded-md py-3 px-4 text-sm" placeholder="Opcional" /></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[10px] font-bold uppercase text-gray-400">Tipo</label><select name="tipo" class="w-full bg-gray-50 border rounded-md py-3 px-4 text-sm"><option value="AHORROS">Ahorros</option><option value="CORRIENTE">Corriente</option><option value="EFECTIVO">Efectivo</option></select></div>
                        <div><label class="text-[10px] font-bold uppercase text-gray-400">Moneda</label><select name="moneda" class="w-full bg-gray-50 border rounded-md py-3 px-4 text-sm"><option value="COP">Peso Colombiano (COP)</option><option value="USD">Dólar (USD)</option></select></div>
                    </div>
                    <div><label class="text-[10px] font-bold uppercase text-gray-400">Saldo Inicial</label><input name="saldoInicial" type="number" step="0.01" class="w-full bg-gray-50 border rounded-md py-3 px-4 text-sm font-bold text-right" value="0.00" required/></div>
                    <div class="pt-4 flex gap-3"><button type="button" id="closeAccountModal" class="flex-1 py-3 bg-gray-100 rounded-md font-bold text-sm">Cancelar</button><button type="submit" class="flex-1 py-3 bg-blue-900 text-white rounded-md font-bold text-sm">Crear Cuenta</button></div>
                </form>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/accounts.js"></script>
</body>
</html>
